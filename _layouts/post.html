---
layout: default
nav: blog
---
<main class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <h1 class="display-5 fw-bold mb-2">{{ page.title }}</h1>
        <p class="text-body-secondary mb-4">{{ page.date | date: "%-d %B %Y" }}</p>

        <hr class="border-dark border-2 opacity-100 mb-4">

        <div class="post-body">
          {{ content }}
        </div>

        <hr class="border-dark border-2 opacity-100 my-4">
        <a href="/blog/" class="btn btn-outline-dark">&larr; All posts</a>

      </div>
    </div>
  </div>
</main>
