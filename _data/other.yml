# --- PHOTO COLLAGE ---
# Put photos in the img folder, then list them here.
# Copy a two-line block (src + alt) to add another photo.
# "alt" is a short description (helps blind visitors & Google).
photos:
  - src: /img/me.HEIC
    alt: me!
  - src: /img/cast.jpg
    alt: Me and the cast of my play, Rhinoceros!
  - src: /img/wedding.jpg
    alt: Me performing harp at a wedding in 2025!
  - src: /img/plastic.jpg
    alt: A photo from the short play I wrote, Plastic
  - src: /img/seagull.JPG
    alt: Me rehearsing my role in the play Seagull!

