# ============================================================
#  THE "OTHER" PAGE — edit this file to change it
#  Lines starting with # are instructions, not content
# ============================================================

# --- PHOTO COLLAGE ---
# Put photos in the img folder, then list them here.
# Copy a two-line block (src + alt) to add another photo.
# "alt" is a short description (helps blind visitors & Google).
photos:
  - src: /img/me.HEIC
    alt: me!
  - src: /img/placeholder-2.svg
    alt: describe this photo
  - src: /img/placeholder-3.svg
    alt: describe this photo
  - src: /img/placeholder-2.svg
    alt: describe this photo
  - src: /img/placeholder-1.svg
    alt: describe this photo

# --- QUOTES ---
# Copy a two-line block (text + by) to add another quote.
quotes:
  - text: Put a quote you like here.
    by: Who said it
  - text: Another one here.
    by: Who said it

# --- CURRENTLY ---
# A little list of whatever you're into right now.
currently:
  - label: Reading
    value: a book title
  - label: Listening to
    value: an album or artist
  - label: Obsessed with
    value: anything at all
